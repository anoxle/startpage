<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anoxle - Startpage</title><meta name="description" content="Highly customizable, minimalistic. Startpage"><meta property="og:title" content="Anoxle - Startpage"><meta property="og:description" content="Highly customizable, minimalistic. Startpage"><meta property="og:image" content="icon.png"><meta name="theme-color" content="#9A62DA"><meta name="color-scheme" content="dark"><link rel="icon" href="icon.png" type="image/png"><link rel="preload" href="index4.js" as="script"><style>body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#000;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}#simple-search-container{width:90%;max-width:640px}#form-search{width:100%}.input-wrap{position:relative;width:100%}#input-query{width:100%;padding:1rem 1.25rem;font-size:1.25rem;background:rgba(18,18,18,.95);border:1px solid #2a2a2f;border-radius:12px;color:#fff;outline:0;box-sizing:border-box;transition:border-color .2s,box-shadow .2s}#input-query:focus{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.2)}#input-query::placeholder{color:#a1a1aa;opacity:.7}.loading-note{margin-top:1rem;font-size:.75rem;color:#a1a1aa;text-align:center;letter-spacing:.5px}</style></head><body><div id="simple-search-container"><form id="form-search"><div class="input-wrap"><input type="text" id="input-query" placeholder="Search or type URL..." autocomplete="off" spellcheck="false" autofocus></div></form><div class="loading-note">Loading full startpage...</div></div><script>const input = document.getElementById('input-query');
        if (input) input.focus();

        const form = document.getElementById('form-search');

        function isUrl(str) {
            return /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i.test(str);
        }

        let searchEngine = 'https://search.brave.com/search?q=';
        try {
            const savedPrefs = localStorage.getItem('user_prefs_v12') || localStorage.getItem('user_prefs_v11');
            if (savedPrefs) {
                const prefs = JSON.parse(savedPrefs);
                if (prefs.engine && prefs.engine !== 'custom') {
                    searchEngine = prefs.engine;
                } else if (prefs.custengine && prefs.engine === 'custom') {
                    searchEngine = prefs.custengine;
                }
            }
        } catch(e) { /* ignore */ }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let q = input.value.trim();
            if (!q) return;

            if (isUrl(q)) {
                window.location.href = /^https?:\/\//i.test(q) ? q : 'https://' + q;
            } else {
                let url = searchEngine;
                if (url.includes('%s')) {
                    url = url.replace('%s', encodeURIComponent(q));
                } else if (url.includes('{query}')) {
                    url = url.replace('{query}', encodeURIComponent(q));
                } else {
                    url = url + encodeURIComponent(q);
                }
                window.location.href = url;
            }
        });</script><script src="app.js" defer="defer"></script></body></html>
